name: Build TWRP for Asus P01Z (Intel SoFIA)

on:
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-20.04 # Старая Убунту, чтобы древние исходники Android 5.1 скомпилировались без ошибок компилятора

    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v3
      with:
        path: device/asus/p021

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagecreator lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

    - name: Set up Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize OmniROM Source Tree
      run: |
        mkdir ~/twrp
        cd ~/twrp
        git config --global user.name "Builder"
        git config --global user.email "builder@email.com"
        repo init --depth=1 -u https://github.com/Minimal-TWRP/android_manifest_twrp_omni.git -b twrp-5.1
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Move Device Tree to Source
      run: |
        mv device ~/twrp/

    - name: Build Recovery Image
      run: |
        cd ~/twrp
        source build/envsetup.sh
        lunch omni_p01z-eng
        make recoveryimage -j$(nproc --all)

    - name: Upload Resulting Image
      uses: actions/upload-artifact@v3
      with:
        name: TWRP-Asus-P01Z
        path: ~/twrp/out/target/product/p021/recovery.img
